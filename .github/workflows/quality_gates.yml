name: ✓ Quality Gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-style:
    name: 🐍 Python Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: python -m pip install poetry==2.2.1

      - name: Install dependencies
        run: env -u VIRTUAL_ENV -u POETRY_ACTIVE poetry install --no-interaction

      - name: Run Ruff
        run: env -u VIRTUAL_ENV -u POETRY_ACTIVE poetry run ruff check src

      - name: Run MyPy
        run: env -u VIRTUAL_ENV -u POETRY_ACTIVE poetry run mypy src

      - name: Run djLint (html)
        run: env -u VIRTUAL_ENV -u POETRY_ACTIVE poetry run djlint src/templates --check

  frontend-style:
    name: 🎨 Frontend Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Stylelint
        run: npm install --no-save stylelint stylelint-config-standard

      - name: Run Stylelint (css)
        run: npx stylelint "src/static/**/*.css"

      - name: Install ESLint
        run: npm install --no-save eslint

      - name: Run ESLint (js)
        run: npx eslint "src/static/js/**/*.js"

  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: python -m pip install poetry==2.2.1

      - name: Install dependencies
        run: env -u VIRTUAL_ENV -u POETRY_ACTIVE poetry install --no-interaction

      - name: Run Pytest
        run: env -u VIRTUAL_ENV -u POETRY_ACTIVE poetry run pytest

  migrations:
    name: 🗃️ Migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: python -m pip install poetry==2.2.1

      - name: Install dependencies
        run: env -u VIRTUAL_ENV -u POETRY_ACTIVE poetry install --no-interaction

      - name: Run migrations
        run: env -u VIRTUAL_ENV -u POETRY_ACTIVE poetry run alembic upgrade head

      - name: Check no pending migrations
        run: |
          env -u VIRTUAL_ENV -u POETRY_ACTIVE poetry run alembic check
