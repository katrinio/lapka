тname: 💨 Smoke Test

on:
  workflow_run:
    workflows: ["✓ Quality Gates"]
    types: [completed]

jobs:
  smoke:
    name: 💨 Smoke
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      SESSION_SECRET_KEY: smoke-test-secret-key
      ECHO_PASSWORD: smoke-test-password

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: python -m pip install poetry==2.2.1

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run middleware tests
        run: poetry run pytest tests/test_middleware.py
