name: 💨 Smoke Test

on:
  workflow_run:
    workflows: ["✓ Quality Gates"]
    types: [completed]

jobs:
  smoke:
    name: 💨 Smoke
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      SESSION_SECRET_KEY: smoke-test-secret-key
      ECHO_PASSWORD: smoke-test-password

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: python -m pip install poetry==2.2.1

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run migrations
        run: poetry run alembic -c src/orm/alembic.ini upgrade head

      - name: Start server
        run: poetry run uvicorn src.app:app --host 127.0.0.1 --port 8000 &

      - name: Wait for server
        run: |
          for i in $(seq 1 10); do
            curl -sf http://127.0.0.1:8000/login && exit 0
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      - name: Check login page responds
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/login)
          echo "GET /login → $STATUS"
          [ "$STATUS" = "200" ]

      - name: Check protected route redirects to login
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L http://127.0.0.1:8000/)
          echo "GET / → $STATUS"
          [ "$STATUS" = "200" ]
