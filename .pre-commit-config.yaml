repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff
        entry: poetry run ruff check src
        language: system
        types: [python]

      - id: mypy
        name: MyPy
        entry: poetry run mypy src
        language: system
        types: [python]
        pass_filenames: false

      - id: djlint
        name: djLint
        entry: python scripts/check_templates.py
        language: system
        files: ^src/templates/.*\.html$

      - id: pytest
        name: Pytest
        entry: poetry run pytest
        language: system
        pass_filenames: false

      - id: stylelint
        name: Stylelint
        entry: npx stylelint "src/static/**/*.css"
        language: system
        files: ^src/static/.*\.css$
