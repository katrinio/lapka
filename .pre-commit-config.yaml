repos:
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.39.1
    hooks:
      - id: eslint
        name: Eslint
        files: ^src/static/js/.*\.js$

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff
        entry: poetry run ruff check
        language: system
        types: [python]

      - id: mypy
        name: MyPy
        entry: poetry run mypy src
        language: system
        types: [python]
        pass_filenames: false

      - id: djlint
        name: djLint
        entry: poetry run djlint --check
        language: system
        files: ^src/templates/.*\.html$

      - id: stylelint
        name: Stylelint
        entry: npx stylelint
        language: system
        files: ^src/static/.*\.css$

      - id: pytest
        name: Pytest
        entry: poetry run pytest
        language: system
        pass_filenames: false

      - id: poetry-check
        name: Poetry check
        entry: poetry check
        language: system
        files: ^pyproject\.toml$
        pass_filenames: false
