repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff
        entry: poetry run ruff check
        language: system
        types: [python]

      - id: mypy
        name: MyPy
        entry: poetry run mypy src
        language: system
        types: [python]
        pass_filenames: false

      - id: djlint
        name: djLint
        entry: poetry run djlint --check
        language: system
        files: ^src/templates/.*\.html$

      - id: stylelint
        name: Stylelint
        entry: npx stylelint
        language: system
        files: ^src/static/.*\.css$

      - id: pytest
        name: Pytest
        entry: poetry run pytest
        language: system
        pass_filenames: false

      - id: poetry-lock-check
        name: Poetry lock check
        entry: poetry lock --check
        language: system
        files: ^pyproject\.toml$
        pass_filenames: false