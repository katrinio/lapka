{% extends "base.html" %}
{% block title %}Edit {{ milestone.slug }}{% endblock %}
{% block styles %}<link rel="stylesheet" href="/static/css/forms.css">{% endblock %}
{% block content %}
    {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
    <a class="back" href="/milestones/{{ milestone.slug }}">← Back</a>
    <h1>Edit milestone</h1>
    <form method="post" action="/milestones/{{ milestone.slug }}/edit">
        <label>
            Title
            <input name="title" value="{{ milestone.title }}" required>
        </label>
        <label>
            Date
            <input id="happened_at"
                   type="date"
                   name="happened_at"
                   value="{{ milestone.happened_at }}"
                   required>
        </label>
        <label>
            Tags
            <input name="tags"
            value="{{ milestone.tags | map(attribute='name') | join(' ') }}">
        </label>
        <label>
            Description
            <textarea name="description">{{ milestone.description }}</textarea>
        </label>
        <button type="submit">Save</button>
    </form>
{% endblock %}
