{% extends "base.html" %}
{% block title %}help{% endblock %}
{% block content %}
    <a class="back" href="/">← Back</a>
    <header>
        <div class="prompt">katrin@echo_:~$ help</div>
    </header>
    <section class="help-screen" data-terminal-table>
        <p class="help-intro">Command reference</p>
        {% for command in commands %}
            <a class="tag-row" data-terminal-table-row>
                <span class="tag-name" data-terminal-label>{{ command.name }}</span>
                <span class="tag-dots" data-terminal-dots></span>
                <span class="tag-count" data-terminal-value>{{ command.description }}</span>
            </a>
        {% endfor %}
    </section>
{% endblock %}
