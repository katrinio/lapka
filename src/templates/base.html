<!DOCTYPE html>
<html lang="{{ lang|default("ru") }}">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
        <title>{% block title %}echo_.log{% endblock %}</title>
        <link rel="stylesheet"
              href="/static/css/base.css?v={{ asset_version("css/base.css") }}">
        <link rel="stylesheet"
              href="/static/css/forms.css?v={{ asset_version("css/forms.css") }}">
        <link rel="stylesheet"
              href="/static/css/timeline.css?v={{ asset_version("css/timeline.css") }}">
        <link rel="stylesheet"
              href="/static/css/milestone.css?v={{ asset_version("css/milestone.css") }}">
        <link rel="stylesheet"
              href="/static/css/terminal.css?v={{ asset_version("css/terminal.css") }}">
        {% block styles %}{% endblock %}
        <script src="/static/js/tag-autocomplete.js" defer></script>
    </head>
    <body>
        <main>
            {% block content %}{% endblock %}
            <div class="terminal-bar">
                <label class="terminal-row" for="terminal-command">
                    <span class="terminal-prompt">echo_ &gt;</span>
                    <input id="terminal-command"
                           class="terminal-input"
                           type="text"
                           name="command"
                           autocomplete="off"
                           autocapitalize="off"
                           autocorrect="off"
                           spellcheck="false">
                </label>
            </div>
        </main>
    </body>
</html>
