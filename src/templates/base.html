<!DOCTYPE html>
<html lang="{{ lang|default("ru") }}">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}echo_.log{% endblock %}</title>
        <link rel="stylesheet" href="/static/css/base.css">
        <link rel="stylesheet" href="/static/css/terminal.css">
        {% block styles %}{% endblock %}
    </head>
    <body>
        <main>
            {% block content %}{% endblock %}
            <div class="terminal-bar">
                <label class="terminal-row" for="terminal-command">
                    <span class="terminal-prompt">echo_ &gt;</span>
                    <input id="terminal-command"
                           class="terminal-input"
                           type="text"
                           name="command"
                           autocomplete="off"
                           autocapitalize="off"
                           autocorrect="off"
                           spellcheck="false">
                </label>
            </div>
        </main>
    </body>
</html>
