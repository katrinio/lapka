{% extends "base.html" %}
{% block title %}tags{% endblock %}
{% block content %}
    <a class="back" href="/">← Back</a>
    <header>
        <div class="prompt">{{ settings.echo_username }}@echo_:~$ tags</div>
    </header>
    <section class="terminal-table" data-terminal-table>
        {% for tag, count in tags %}
            <a class="terminal-table-row"
               href="/tags/{{ tag }}"
               data-terminal-table-row>
                <span class="terminal-table-label" data-terminal-label>{{ tag }}</span>
                <span class="terminal-table-dots" data-terminal-dots></span>
                <span class="terminal-table-value" data-terminal-value>{{ count }}</span>
            </a>
        {% endfor %}
    </section>
{% endblock %}
